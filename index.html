<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You, My Love </title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100;0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Ailerons';
      src: local('Ailerons'), url('./assets/fonts/Ailerons-Regular.otf') format('opentype'), url('https://cdn.jsdelivr.net/gh/felipesilvadv/ailerons@main/Ailerons-Typeface.otf') format('opentype');
      font-display: swap;
    }

    :root {
      --her-blue:        #3a7bd5;
      --her-blue-light:  #6fa3e8;
      --her-blue-pale:   #c8dff7;
      --my-red:          #c0392b;
      --my-red-light:    #e05c4b;
      --my-red-deep:     #8b1a12;
      --warm-rose:       #f4d4d8;
      --warm-petal:      #e8b4bb;
      --heart-pink:      #e8637a;
      --heart-pink-dark: #c43f5a;
      --bg:              #fdf5f7;
      --border:          rgba(200, 140, 160, 0.2);
      --text:            #2a1a20;
      --text-muted:      #7a5560;
      --text-faint:      #b89aa0;
      --text-on-dark:    #fff8fa;
      --font:            'Lato', 'Helvetica Neue', sans-serif;
      --font-sig:        'Ailerons', 'Josefin Sans', 'Lato', sans-serif;
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
      --text-2xl:  clamp(2rem,     1.2rem  + 2.5vw,  3.5rem);
      --text-3xl:  clamp(2.5rem,   1rem    + 4vw,    5rem);
      --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;
      --space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;
      --space-8:2rem;--space-10:2.5rem;--space-12:3rem;
      --space-16:4rem;--space-20:5rem;--space-24:6rem;
      --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;
      --radius-xl:1rem;--radius-2xl:1.5rem;--radius-full:9999px;
      --ease-out:cubic-bezier(0.16,1,0.3,1);
      --t-fast:180ms;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;scroll-behavior:smooth;}
    body{min-height:100dvh;font-family:var(--font);font-size:var(--text-base);color:var(--text);background-color:var(--bg);line-height:1.7;overflow-x:hidden;}
    img,picture,video,canvas,svg{display:block;max-width:100%;}
    h1,h2,h3,h4{text-wrap:balance;line-height:1.2;font-family:var(--font);}
    p,li{text-wrap:pretty;max-width:65ch;}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}

    /* BACKGROUND BLOBS */
    .bg-wash{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.45;}
    .bg-blob-1{width:60vw;height:60vw;top:-10%;left:-15%;background:radial-gradient(circle,var(--her-blue-light),transparent 70%);animation:bd1 20s ease-in-out infinite alternate;}
    .bg-blob-2{width:50vw;height:50vw;bottom:-10%;right:-10%;background:radial-gradient(circle,var(--my-red-light),transparent 70%);animation:bd2 25s ease-in-out infinite alternate;}
    .bg-blob-3{width:45vw;height:45vw;top:40%;left:30%;background:radial-gradient(circle,var(--warm-petal),transparent 70%);animation:bd3 18s ease-in-out infinite alternate;}
    @keyframes bd1{from{transform:translate(0,0)scale(1);}to{transform:translate(5vw,8vh)scale(1.1);}}
    @keyframes bd2{from{transform:translate(0,0)scale(1);}to{transform:translate(-6vw,-5vh)scale(0.95);}}
    @keyframes bd3{from{transform:translate(0,0)scale(1);}to{transform:translate(-4vw,6vh)scale(1.08);}}

    /* FLOATING HEARTS */
    .hearts-layer{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
    .heart-float{position:absolute;animation:heart-rise linear forwards;opacity:0;}
    .heart-float svg{display:block;}
    @keyframes heart-rise{
      0%  {opacity:0;transform:translateY(0) rotate(0deg);}
      10% {opacity:0.7;}
      80% {opacity:0.5;}
      100%{opacity:0;transform:translateY(-110vh) rotate(25deg);}
    }

    /* PAGE LAYOUT */
    .page{position:relative;z-index:2;min-height:100dvh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-8) var(--space-4);}
    .page.active{display:flex;}

    /* ===== PAGE 1 — WELCOME ===== */
    .welcome-card{
      background:rgba(255,248,250,0.78);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid var(--border);border-radius:var(--radius-2xl);
      padding:clamp(var(--space-8),5vw,var(--space-16));
      max-width:680px;width:100%;text-align:center;position:relative;
    }
    .greeting-time{font-size:var(--text-sm);font-weight:300;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:var(--space-6);}
    .greeting-main{font-size:var(--text-2xl);font-weight:700;color:var(--text);margin-bottom:var(--space-4);line-height:1.15;}
    .greeting-main em{font-style:normal;background:linear-gradient(in oklab,var(--her-blue),var(--heart-pink-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .greeting-date{font-size:var(--text-base);color:var(--text-muted);margin-bottom:var(--space-8);}

    /* Divider */
    .divider-hearts{display:flex;align-items:center;gap:var(--space-3);justify-content:center;margin-bottom:var(--space-8);}
    .divider-hearts .line{flex:1;max-width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--warm-petal));}
    .divider-hearts .line.right{background:linear-gradient(90deg,var(--warm-petal),transparent);}

    .topic-announce{font-size:var(--text-base);color:var(--text-muted);margin-bottom:var(--space-4);line-height:1.7;}
    .topic-name{display:block;text-align:center;font-size:var(--text-xl);font-weight:700;font-style:italic;background:linear-gradient(in oklab,var(--my-red-deep),var(--heart-pink-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:var(--space-6);}

    .cta-row{display:flex;justify-content:flex-end;margin-top:var(--space-2);}
    .cta-btn{display:inline-flex;align-items:center;gap:var(--space-2);background:linear-gradient(135deg in oklab,var(--her-blue),var(--heart-pink-dark));color:var(--text-on-dark);font-size:var(--text-sm);font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:var(--space-3) var(--space-6);border-radius:var(--radius-full);border:none;cursor:pointer;transition:opacity var(--t-fast) var(--ease-out),transform var(--t-fast) var(--ease-out);}
    .cta-btn:hover{opacity:0.9;transform:translateY(-2px);}
    .cta-btn:active{opacity:1;transform:translateY(0);}
    .day-indicator{position:absolute;top:var(--space-4);right:var(--space-5);font-size:var(--text-xs);color:var(--text-faint);letter-spacing:0.08em;}

    /* ===== PAGE 2 — MESSAGE ===== */
    .message-page-inner{
      display:flex;flex-direction:column;align-items:center;
      gap:var(--space-6);
      max-width:720px;width:100%;
    }

    /* Polaroid frames */
    .polaroid{
      background:#fffef8;
      border:1px solid rgba(180,150,140,0.25);
      border-radius:var(--radius-sm);
      padding:var(--space-4) var(--space-4) var(--space-8);
      width:100%;
      position:relative;
    }
    .polaroid-img{
      width:100%;
      aspect-ratio:4/3;
      background:rgba(200,180,190,0.15);
      border-radius:2px;
      overflow:hidden;
      display:flex;align-items:center;justify-content:center;
    }
    .polaroid-img img{width:100%;height:100%;object-fit:cover;border-radius:2px;}
    .polaroid-placeholder{
      font-size:var(--text-sm);color:var(--text-faint);
      font-style:italic;text-align:center;padding:var(--space-4);
      max-width:none;
    }
    .polaroid-caption{
      position:absolute;bottom:var(--space-2);left:0;right:0;
      text-align:center;font-size:var(--text-xs);color:var(--text-faint);
      letter-spacing:0.05em;
    }

    /* Message card */
    .message-card{
      background:rgba(255,248,250,0.82);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1px solid var(--border);border-radius:var(--radius-2xl);
      padding:clamp(var(--space-8),5vw,var(--space-16));
      width:100%;position:relative;
    }
    .back-btn{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-muted);margin-bottom:var(--space-8);cursor:pointer;transition:color var(--t-fast) var(--ease-out);background:none;border:none;padding:0;}
    .back-btn:hover{color:var(--heart-pink-dark);}
    .message-element-label{font-size:var(--text-xs);font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--her-blue);margin-bottom:var(--space-3);}
    .message-element-title{font-size:var(--text-3xl);font-weight:700;color:var(--text);margin-bottom:var(--space-6);line-height:1.1;}
    .message-divider{width:60px;height:3px;background:linear-gradient(90deg,var(--my-red),var(--heart-pink));border-radius:var(--radius-full);margin-bottom:var(--space-8);}
    .message-body{font-size:var(--text-base);color:var(--text-muted);line-height:1.9;white-space:pre-line;}

    /* Signature in Ailerons */
    .message-signature{
      margin-top:var(--space-10);
      font-family:var(--font-sig);
      font-size:var(--text-lg);
      color:var(--my-red);
      text-align:right;
      line-height:1.4;
    }
    .message-signature .sig-heart{display:inline-block;vertical-align:middle;margin:0 var(--space-1);}
    .message-signature .sig-name{display:block;font-size:var(--text-xl);}

    /* PAGE TRANSITION */
    .page-transition-overlay{position:fixed;inset:0;z-index:100;background:linear-gradient(135deg in oklab,var(--her-blue-pale),var(--warm-rose));opacity:0;pointer-events:none;transition:opacity 0.35s var(--ease-out);}
    .page-transition-overlay.active{opacity:1;pointer-events:all;}

    /* ENTRY ANIMATIONS */
    .animate-in{animation:enter-up 0.6s var(--ease-out) both;}
    @keyframes enter-up{from{opacity:0;clip-path:inset(8% 0 0 0);}to{opacity:1;clip-path:inset(0 0 0 0);}}
    .d1{animation-delay:0.08s;}.d2{animation-delay:0.16s;}.d3{animation-delay:0.24s;}.d4{animation-delay:0.32s;}.d5{animation-delay:0.4s;}

    @media(max-width:480px){
      .welcome-card,.message-card{border-radius:var(--radius-xl);}
      .greeting-main{font-size:var(--text-xl);}
    }
  </style>
</head>
<body>

<div class="bg-wash" aria-hidden="true">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>
</div>
<div class="hearts-layer" aria-hidden="true" id="heartsLayer"></div>
<div class="page-transition-overlay" id="transitionOverlay"></div>

<!-- ===== PAGE 1: WELCOME ===== -->
<section class="page active" id="pageLanding" role="main">
  <div class="welcome-card animate-in">
    <div class="day-indicator" id="dayIndicator"></div>

    <p class="greeting-time animate-in d1" id="greetingTime"></p>

    <h1 class="greeting-main animate-in d2" id="greetingMain"></h1>

    <p class="greeting-date animate-in d3" id="greetingDate"></p>

    <!-- Divider heart: arrow enters from bottom-left outside, hidden through middle, reappears exiting top-right outside -->
    <div class="divider-hearts animate-in d3">
      <div class="line"></div>
      <svg width="44" height="44" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <!-- Clip mask = the heart shape: only inside the heart is clipped OUT (we invert via two rects) -->
          <!-- We draw arrow in two segments: outside-left and outside-right, skipping the heart interior -->
          <!-- Heart fill path for clip -->
          <clipPath id="heartClip">
            <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z"/>
          </clipPath>
          <!-- Inverse clip: everything EXCEPT the heart -->
          <mask id="outsideHeart">
            <rect width="60" height="60" fill="white"/>
            <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z" fill="black"/>
          </mask>
        </defs>
        <!-- Heart shape (pink) -->
        <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z" fill="#e8637a" stroke="#c43f5a" stroke-width="1.5"/>
        <!-- Arrow line: full diagonal from (-4,58) to (64,2) — visible only outside heart via mask -->
        <line x1="5" y1="51" x2="55" y2="9" stroke="#3a7bd5" stroke-width="2.2" stroke-linecap="round" mask="url(#outsideHeart)"/>
        <!-- Arrowhead at exit point top-right (64,2) — always outside -->
        <polyline points="47,7 55,9 53,17" stroke="#3a7bd5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" mask="url(#outsideHeart)"/>
      </svg>
      <div class="line right"></div>
    </div>

    <p class="topic-announce animate-in d4">Today, I'm gonna talk about</p>
    <div class="topic-name animate-in d4" id="topicName"></div>

    <div class="cta-row animate-in d5">
      <button class="cta-btn" onclick="goToMessage()" aria-label="Read today's message">
        Read my message
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>
</section>

<!-- ===== PAGE 2: MESSAGE ===== -->
<section class="page" id="pageMessage" role="main" aria-hidden="true">
  <div class="message-page-inner">

    <!-- TOP POLAROID -->
    <div class="polaroid animate-in" id="polaroidTop">
      <div class="polaroid-img" id="polaroidTopImg">
        <p class="polaroid-placeholder">Hopefully a photo related to the topic</p>
      </div>
      <div class="polaroid-caption" id="polaroidTopCaption"></div>
    </div>

    <!-- MESSAGE CARD -->
    <div class="message-card">
      <button class="back-btn" onclick="goBack()" aria-label="Go back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </button>

      <p class="message-element-label animate-in">Today's Lesson</p>
      <h2 class="message-element-title animate-in d1" id="messageTitle"></h2>
      <div class="message-divider animate-in d2"></div>
      <div class="message-body animate-in d3" id="messageBody"></div>

      <div class="message-signature animate-in d4">
        <span id="sigPhrase">With all my heart</span>
        <span class="sig-heart">
          <svg width="20" height="20" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <mask id="outsideHeart2">
                <rect width="60" height="60" fill="white"/>
                <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z" fill="black"/>
              </mask>
            </defs>
            <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z" fill="#c0392b"/>
            <line x1="5" y1="51" x2="55" y2="9" stroke="#3a7bd5" stroke-width="2.4" stroke-linecap="round" mask="url(#outsideHeart2)"/>
            <polyline points="47,7 55,9 53,17" stroke="#3a7bd5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none" mask="url(#outsideHeart2)"/>
          </svg>
        </span>
        <span class="sig-name">— Venom</span>
      </div>
    </div>

    <!-- BOTTOM POLAROID -->
    <div class="polaroid animate-in d2" id="polaroidBottom">
      <div class="polaroid-img" id="polaroidBottomImg">
        <p class="polaroid-placeholder">A photo of me (or a dog)</p>
      </div>
      <div class="polaroid-caption" id="polaroidBottomCaption"></div>
    </div>

  </div>
</section>

    { day:26, element:"Adventure",   message:"Write your personal message about Adventure here.\n\nReplace this with your own heartfelt words.",   sig:"With all my heart" },
    { day:27, element:"Serenity",    message:"Write your personal message about Serenity here.\n\nReplace this with your own heartfelt words.",    sig:"With all my heart" },
    { day:28, element:"Passion",     message:"Write your personal message about Passion here.\n\nReplace this with your own heartfelt words.",     sig:"With all my heart" },

  /* ===== IST GREETING ===== */
  function getGreetingIST() {
    // Convert current time to IST (UTC+5:30)
    const now    = new Date();
    const utcMs  = now.getTime() + now.getTimezoneOffset() * 60000;
    const istMs  = utcMs + (5.5 * 3600000);
    const ist    = new Date(istMs);
    const h      = ist.getHours();

    if (h >= 4 && h < 6)   return { word: "What are you doing...",  special: true };
    if (h >= 6 && h < 11)  return { word: "Good Morning",           special: false };
    if (h >= 11 && h < 15) return { word: "Good Afternoon",         special: false };
    if (h >= 15 && h < 21) return { word: "Good Evening",           special: false };
    return                         { word: "Good Night",             special: false };
  }

  function formatDate(d) {
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  }

  function getTodayData() {
    return DAYS_DATA[Math.min(new Date().getDate(), 30) - 1];
  }

  /* Deterministic per-day seeded random (day number as seed) for bottom polaroid */
  function seededRand(seed) {
    let x = Math.sin(seed + 1) * 10000;
    return x - Math.floor(x);
  }

  /* ===== POPULATE PAGE 1 ===== */
  function populateLanding() {
    const today   = new Date();
    const data    = getTodayData();
    const greeting = getGreetingIST();

    const mainEl = document.getElementById('greetingMain');
    if (greeting.special) {
      mainEl.innerHTML = `<em>${greeting.word}</em>`;
    } else {
      mainEl.innerHTML = `<em>${greeting.word}</em> my love!`;
    }

    document.getElementById('greetingDate').textContent = `Today is ${formatDate(today)}`;
    document.getElementById('topicName').textContent    = data.element;
    document.getElementById('dayIndicator').textContent = `Day ${data.day} of 30`;
  }

  /* ===== POPULATE PAGE 2 ===== */
  function populateMessage() {
    const data = getTodayData();
    const day  = data.day;

    document.getElementById('messageTitle').textContent = data.element;
    document.getElementById('messageBody').textContent  = data.message;
    document.getElementById('sigPhrase').textContent    = data.sig;

    /* Top polaroid: Us{day} */
    const topImg = document.getElementById('polaroidTopImg');
    const topCap = document.getElementById('polaroidTopCaption');
    const usImg  = new Image();
    usImg.src    = `./assets/Us${day}.jpg`;
    usImg.alt    = `Us — Day ${day}`;
    usImg.width  = 680; usImg.height = 510; usImg.loading = 'lazy';
    usImg.style  = 'width:100%;height:100%;object-fit:cover;border-radius:2px;';
    usImg.onerror = () => {
      topImg.innerHTML = `<p class="polaroid-placeholder">Hopefully a photo related to the topic</p>`;
    };
    usImg.onload  = () => { topImg.innerHTML = ''; topImg.appendChild(usImg); };
    topCap.textContent = 'Hopefully a photo related to the topic';

    /* Bottom polaroid: 50/50 seeded per day → Me{day} or Dog{day} */
    const bottomImg = document.getElementById('polaroidBottomImg');
    const bottomCap = document.getElementById('polaroidBottomCaption');
    const isMe      = seededRand(day) < 0.5;
    const prefix    = isMe ? 'Me' : 'Dog';
    const label     = isMe ? `Me — Day ${day}` : `Dog — Day ${day}`;
    const botImg    = new Image();
    botImg.src      = `./assets/${prefix}${day}.jpg`;
    botImg.alt      = label;
    botImg.width    = 680; botImg.height = 510; botImg.loading = 'lazy';
    botImg.style    = 'width:100%;height:100%;object-fit:cover;border-radius:2px;';
    botImg.onerror  = () => {
      bottomImg.innerHTML = `<p class="polaroid-placeholder">A photo of me (or a dog)</p>`;
    };
    botImg.onload   = () => { bottomImg.innerHTML = ''; bottomImg.appendChild(botImg); };
    bottomCap.textContent = 'A photo of me (or a dog)';
  }

  /* ===== NAVIGATION ===== */
  function goToMessage() {
    populateMessage();
    switchPage('pageLanding', 'pageMessage');
  }
  function goBack() { switchPage('pageMessage', 'pageLanding'); }

  function switchPage(fromId, toId) {
    const overlay = document.getElementById('transitionOverlay');
    overlay.classList.add('active');
    setTimeout(() => {
      document.getElementById(fromId).classList.remove('active');
      document.getElementById(fromId).setAttribute('aria-hidden','true');
      document.getElementById(toId).classList.add('active');
      document.getElementById(toId).removeAttribute('aria-hidden');
      document.querySelectorAll(`#${toId} .animate-in`).forEach(el => {
        el.style.animation = 'none'; void el.offsetWidth; el.style.animation = '';
      });
      overlay.classList.remove('active');
    }, 350);
  }

  /* ===== FLOATING HEARTS ===== */
  function makeHeartSVG(sz) {
    const s = sz === 'big' ? 30 : 20;
    const maskId = `oh_${Math.random().toString(36).slice(2)}`;
    return `<svg width="${s}" height="${s}" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <mask id="${maskId}">
          <rect width="60" height="60" fill="white"/>
          <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z" fill="black"/>
        </mask>
      </defs>
      <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z" fill="#e8637a" stroke="#c43f5a" stroke-width="1.5"/>
      <line x1="5" y1="51" x2="55" y2="9" stroke="#3a7bd5" stroke-width="2.2" stroke-linecap="round" mask="url(#${maskId})"/>
      <polyline points="47,7 55,9 53,17" stroke="#3a7bd5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>`;
  }

  function spawnHeart() {
    const layer = document.getElementById('heartsLayer');
    const el    = document.createElement('div');
    el.className = 'heart-float';
    el.innerHTML = makeHeartSVG(Math.random() > 0.5 ? 'big' : 'small');
    const dur = 8 + Math.random() * 12;
    const del = Math.random() * 4;
    el.style.left             = `${Math.random() * 96}vw`;
    el.style.bottom           = '-60px';
    el.style.animationDuration = `${dur}s`;
    el.style.animationDelay   = `${del}s`;
    layer.appendChild(el);
    setTimeout(() => el.remove(), (dur + del + 1) * 1000);
  }

  setInterval(spawnHeart, 1200);
  [0,300,700,1400,2100].forEach(d => setTimeout(spawnHeart, d));

  /* ===== INIT ===== */
  populateLanding();
</script>
</body>
</html>
