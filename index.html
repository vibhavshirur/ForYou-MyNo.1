<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You, My Love 💕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Ailerons';
      src: local('Ailerons'),
           url('./assets/fonts/Ailerons-Regular.otf') format('opentype'),
           url('https://cdn.jsdelivr.net/gh/felipesilvadv/ailerons@main/Ailerons-Typeface.otf') format('opentype');
      font-display: swap;
    }

    :root {
      --her-blue:        #3a7bd5;
      --her-blue-light:  #6fa3e8;
      --her-blue-pale:   #c8dff7;
      --my-red:          #c0392b;
      --my-red-light:    #e05c4b;
      --my-red-deep:     #8b1a12;
      --warm-rose:       #f4d4d8;
      --warm-petal:      #e8b4bb;
      --heart-pink:      #e8637a;
      --heart-pink-dark: #c43f5a;
      --bg:              #fdf5f7;
      --border:          rgba(200,140,160,0.2);
      --text:            #2a1a20;
      --text-muted:      #7a5560;
      --text-faint:      #b89aa0;
      --text-on-dark:    #fff8fa;
      --font:            'Lato', 'Helvetica Neue', sans-serif;
      --font-sig:        'Ailerons', 'Josefin Sans', 'Lato', sans-serif;
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
      --text-2xl:  clamp(2rem,     1.2rem  + 2.5vw,  3.5rem);
      --text-3xl:  clamp(2.5rem,   1rem    + 4vw,    5rem);
      --sp1:.25rem;--sp2:.5rem;--sp3:.75rem;--sp4:1rem;--sp5:1.25rem;
      --sp6:1.5rem;--sp8:2rem;--sp10:2.5rem;--sp12:3rem;--sp16:4rem;
      --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;
      --r-xl:1rem;--r-2xl:1.5rem;--r-full:9999px;
      --ease-out:cubic-bezier(0.16,1,0.3,1);
      --t-fast:180ms;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;scroll-behavior:smooth;}
    body{min-height:100dvh;font-family:var(--font);font-size:var(--text-base);color:var(--text);background-color:var(--bg);line-height:1.7;overflow-x:hidden;}
    img,picture,video,canvas,svg{display:block;max-width:100%;}
    h1,h2,h3,h4{text-wrap:balance;line-height:1.2;font-family:var(--font);}
    p,li{text-wrap:pretty;max-width:65ch;}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}

    /* ── BACKGROUND BLOBS ── */
    .bg-wash{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.45;}
    .bg-blob-1{width:60vw;height:60vw;top:-10%;left:-15%;background:radial-gradient(circle,var(--her-blue-light),transparent 70%);animation:bd1 20s ease-in-out infinite alternate;}
    .bg-blob-2{width:50vw;height:50vw;bottom:-10%;right:-10%;background:radial-gradient(circle,var(--my-red-light),transparent 70%);animation:bd2 25s ease-in-out infinite alternate;}
    .bg-blob-3{width:45vw;height:45vw;top:40%;left:30%;background:radial-gradient(circle,var(--warm-petal),transparent 70%);animation:bd3 18s ease-in-out infinite alternate;}
    @keyframes bd1{from{transform:translate(0,0)scale(1);}to{transform:translate(5vw,8vh)scale(1.1);}}
    @keyframes bd2{from{transform:translate(0,0)scale(1);}to{transform:translate(-6vw,-5vh)scale(0.95);}}
    @keyframes bd3{from{transform:translate(0,0)scale(1);}to{transform:translate(-4vw,6vh)scale(1.08);}}

    /* ── FLOATING HEARTS ── */
    .hearts-layer{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
    .heart-float{position:absolute;animation:heart-rise linear forwards;opacity:0;}
    .heart-float svg{display:block;}
    @keyframes heart-rise{
      0%{opacity:0;transform:translateY(0)rotate(0deg);}
      10%{opacity:0.7;}80%{opacity:0.5;}
      100%{opacity:0;transform:translateY(-110vh)rotate(25deg);}
    }

    /* ── PAGE LAYOUT ── */
    .page{position:relative;z-index:2;min-height:100dvh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:var(--sp8) var(--sp4);}
    .page.active{display:flex;}

    /* ── PAGE 1: WELCOME ── */
    .welcome-card{
      background:rgba(255,248,250,0.78);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid var(--border);border-radius:var(--r-2xl);
      padding:clamp(var(--sp8),5vw,var(--sp16));
      max-width:680px;width:100%;text-align:center;position:relative;
    }
    .day-indicator{position:absolute;top:var(--sp4);right:var(--sp5);font-size:var(--text-xs);color:var(--text-faint);letter-spacing:0.08em;}
    .greeting-time{font-size:var(--text-sm);font-weight:300;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:var(--sp6);}
    .greeting-main{font-size:var(--text-2xl);font-weight:700;color:var(--text);margin-bottom:var(--sp4);line-height:1.15;}
    .greeting-main em{font-style:normal;background:linear-gradient(in oklab,var(--her-blue),var(--heart-pink-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .greeting-date{font-size:var(--text-base);color:var(--text-muted);margin-bottom:var(--sp8);}

    .divider-hearts{display:flex;align-items:center;gap:var(--sp3);justify-content:center;margin-bottom:var(--sp8);}
    .divider-hearts .line{flex:1;max-width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--warm-petal));}
    .divider-hearts .line.right{background:linear-gradient(90deg,var(--warm-petal),transparent);}

    .topic-announce{font-size:var(--text-base);color:var(--text-muted);margin-bottom:var(--sp4);line-height:1.7;}
    .topic-name{display:block;text-align:center;font-size:var(--text-xl);font-weight:700;font-style:italic;background:linear-gradient(in oklab,var(--my-red-deep),var(--heart-pink-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:var(--sp6);}

    .cta-row{display:flex;justify-content:flex-end;margin-top:var(--sp2);}
    .cta-btn{display:inline-flex;align-items:center;gap:var(--sp2);background:linear-gradient(135deg in oklab,var(--her-blue),var(--heart-pink-dark));color:var(--text-on-dark);font-size:var(--text-sm);font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:var(--sp3) var(--sp6);border-radius:var(--r-full);border:none;cursor:pointer;transition:opacity var(--t-fast) var(--ease-out),transform var(--t-fast) var(--ease-out);}
    .cta-btn:hover{opacity:0.9;transform:translateY(-2px);}
    .cta-btn:active{opacity:1;transform:translateY(0);}

    /* ── PAGE 2: MESSAGE ── */
    .message-page-inner{display:flex;flex-direction:column;align-items:center;gap:var(--sp6);max-width:720px;width:100%;}

    /* Polaroid — dynamic height based on photo */
    .polaroid{background:#fffef8;border:1px solid rgba(180,150,140,0.25);border-radius:var(--r-sm);padding:var(--sp4) var(--sp4) var(--sp8);width:100%;position:relative;}
    .polaroid-media{width:100%;background:rgba(200,180,190,0.12);border-radius:2px;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:120px;}
    .polaroid-media img,.polaroid-media video{width:100%;height:auto;max-height:80vh;object-fit:contain;display:block;border-radius:2px;}
    .polaroid-placeholder{font-size:var(--text-sm);color:var(--text-faint);font-style:italic;text-align:center;padding:var(--sp4);max-width:none;}
    .polaroid-caption{position:absolute;bottom:var(--sp2);left:0;right:0;text-align:center;font-size:var(--text-xs);color:var(--text-faint);letter-spacing:0.05em;}

    /* Message card */
    .message-card{background:rgba(255,248,250,0.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r-2xl);padding:clamp(var(--sp8),5vw,var(--sp16));width:100%;position:relative;}
    .back-btn{display:inline-flex;align-items:center;gap:var(--sp2);font-size:var(--text-sm);color:var(--text-muted);margin-bottom:var(--sp8);cursor:pointer;transition:color var(--t-fast) var(--ease-out);background:none;border:none;padding:0;}
    .back-btn:hover{color:var(--heart-pink-dark);}
    .message-element-label{font-size:var(--text-xs);font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--her-blue);margin-bottom:var(--sp3);}
    .message-element-title{font-size:var(--text-3xl);font-weight:700;color:var(--text);margin-bottom:var(--sp6);line-height:1.1;}
    .message-divider{width:60px;height:3px;background:linear-gradient(90deg,var(--my-red),var(--heart-pink));border-radius:var(--r-full);margin-bottom:var(--sp8);}
    .message-body{font-size:var(--text-base);color:var(--text-muted);line-height:1.9;white-space:pre-line;}

    /* Signature */
    .message-signature{margin-top:var(--sp10);font-family:var(--font-sig);font-size:var(--text-lg);color:var(--my-red);text-align:right;line-height:1.4;}
    .sig-heart{display:inline-block;vertical-align:middle;margin:0 .2rem;}
    .sig-name{display:block;font-size:var(--text-xl);}
    .venom-toggle{
      cursor:pointer;
      border-bottom:1px dashed rgba(192,57,43,0.4);
      transition:opacity var(--t-fast) var(--ease-out), border-color var(--t-fast);
    }
    .venom-toggle:hover{opacity:0.75;border-color:rgba(192,57,43,0.8);}

    /* ── PAGE TRANSITION ── */
    .page-transition-overlay{position:fixed;inset:0;z-index:100;background:linear-gradient(135deg in oklab,var(--her-blue-pale),var(--warm-rose));opacity:0;pointer-events:none;transition:opacity 0.35s var(--ease-out);}
    .page-transition-overlay.active{opacity:1;pointer-events:all;}

    /* ── ENTRY ANIMATIONS ── */
    .animate-in{animation:enter-up 0.6s var(--ease-out) both;}
    @keyframes enter-up{from{opacity:0;clip-path:inset(8% 0 0 0);}to{opacity:1;clip-path:inset(0 0 0 0);}}
    .d1{animation-delay:.08s;}.d2{animation-delay:.16s;}.d3{animation-delay:.24s;}
    .d4{animation-delay:.32s;}.d5{animation-delay:.4s;}

    @media(max-width:480px){
      .welcome-card,.message-card{border-radius:var(--r-xl);}
      .greeting-main{font-size:var(--text-xl);}
    }
  </style>
</head>
<body>

<div class="bg-wash" aria-hidden="true">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>
</div>
<div class="hearts-layer" aria-hidden="true" id="heartsLayer"></div>
<div class="page-transition-overlay" id="transitionOverlay"></div>

<!-- ══════════════════════════════
     PAGE 1 — WELCOME
══════════════════════════════ -->
<section class="page active" id="pageLanding" role="main">
  <div class="welcome-card animate-in">
    <div class="day-indicator" id="dayIndicator"></div>
    <p class="greeting-time animate-in d1" id="greetingTime"></p>
    <h1 class="greeting-main animate-in d2" id="greetingMain"></h1>
    <p class="greeting-date animate-in d3" id="greetingDate"></p>

    <div class="divider-hearts animate-in d3">
      <div class="line"></div>
      <svg width="44" height="44" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <mask id="outsideHeart">
            <rect width="60" height="60" fill="white"/>
            <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z" fill="black"/>
          </mask>
        </defs>
        <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z" fill="#e8637a" stroke="#c43f5a" stroke-width="1.5"/>
        <line x1="6" y1="50" x2="56" y2="8" stroke="#3a7bd5" stroke-width="2.2" stroke-linecap="round" mask="url(#outsideHeart)"/>
        <polyline points="48,6 56,8 54,16" stroke="#3a7bd5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" mask="url(#outsideHeart)"/>
      </svg>
      <div class="line right"></div>
    </div>

    <p class="topic-announce animate-in d4">Today, I'm gonna talk about</p>
    <div class="topic-name animate-in d4" id="topicName"></div>

    <div class="cta-row animate-in d5">
      <button class="cta-btn" onclick="goToMessage()" aria-label="Read today's message">
        Read my message
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>
</section>

<!-- ══════════════════════════════
     PAGE 2 — MESSAGE
══════════════════════════════ -->
<section class="page" id="pageMessage" role="main" aria-hidden="true">
  <div class="message-page-inner">

    <!-- TOP POLAROID -->
    <div class="polaroid animate-in">
      <div class="polaroid-media" id="polaroidTopMedia">
        <p class="polaroid-placeholder">Hopefully a photo related to the topic</p>
      </div>
      <div class="polaroid-caption">Hopefully a photo related to the topic</div>
    </div>

    <!-- MESSAGE CARD -->
    <div class="message-card">
      <button class="back-btn" onclick="goBack()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </button>
      <p class="message-element-label animate-in">Today's Lesson</p>
      <h2 class="message-element-title animate-in d1" id="messageTitle"></h2>
      <div class="message-divider animate-in d2"></div>
      <div class="message-body animate-in d3" id="messageBody"></div>

      <div class="message-signature animate-in d4">
        <span id="sigPhrase">With all my heart</span>
        <span class="sig-heart">
          <svg width="20" height="20" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <mask id="outsideHeart2">
                <rect width="60" height="60" fill="white"/>
                <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z" fill="black"/>
              </mask>
            </defs>
            <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z" fill="#c0392b"/>
            <line x1="6" y1="50" x2="56" y2="8" stroke="#3a7bd5" stroke-width="2.4" stroke-linecap="round" mask="url(#outsideHeart2)"/>
            <polyline points="48,6 56,8 54,16" stroke="#3a7bd5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none" mask="url(#outsideHeart2)"/>
          </svg>
        </span>
        <span class="sig-name">— <span id="venomToggle" class="venom-toggle" title="psst... click me">Venom</span></span>
      </div>
    </div>

    <!-- BOTTOM POLAROID -->
    <div class="polaroid animate-in d2">
      <div class="polaroid-media" id="polaroidBottomMedia">
        <p class="polaroid-placeholder">A photo of me (or a dog)</p>
      </div>
      <div class="polaroid-caption" id="polaroidBottomCaption">A photo of me (or a dog)</div>
    </div>

  </div>
</section>

<script>
  /* ════════════════════════════════════════
     30-DAY DATA
     → Replace each message & sig with your personal words!
  ════════════════════════════════════════ */
  const DAYS_DATA = [
    { day:1,  element:"Patience",    sig:"For my Devious Little Miscreant", message:"We've been together a little over 6 years. We've known each other a little over 17. I have yearned for you almost my entire life, and I will always continue to do so. You have an innate ability, to make one long for you, and yet always relax. You may not realise it, but I only am so patient, because of you. I always think how I would treat you, and how I'd want to be thought of by you, and this is the only thing that I've ever needed, and what keeps me such a Patient person. You underestimate yourself, my love, and today, I want you to notice your patience. Realise when you get annoyed by people, and yet remain silent. Realise how unfair life is, and yet you wait with a still heart. Realise how- This is one of your BEST qualities." },
    { day:2,  element:"Kindness",    sig:"For my sweet Sleepy Baby", message:"My first memory of falling in love with you is back when we were kids. It was sheetal ma'am's class, and we were sat close to each other, and one of these classess we were taking notes and someone's pencil fell down. It was much closer to me than you, and I only continued to write notes, telling myself 'I'll pick it up in a second'. The next second, I saw you drag your body further than required- just to get a pencil for someone else. \n That is not my only memory of your kindness, but it is my favourite. That was a moment I beat myself up over for years, wondering why I didn't just do the right thing, and kept wondering why you did it. Every second I spent thinking about that, I spent thinking about you. Every second I thought about you, I fell even more in love. Whether you let Nish use your scooter, give your notes to a junior, or even just pass on a water bottle, I want you to recognize that- You are kind.  " },
    { day:3,  element:"Gratitude",   sig:"For you, honey", message:"Millions of times I have heard you talk about the sunset, about dogs, about so many things that make you happy. I'm no block of cheese to be grated, but I am so grateful to have you in my life. I've always been pessimistic, and called it 'being real', but having you around always gave me an excuse to hear about the happy perspectives in life. I want to share that with you, and make you feel the way you make me. I want to show you my gratitude in not just words, but in actions. In this lifetime, I know I have a lot to be thankful for, but the one thing I will never be thankful enough about, is having you, for almost 17 years of my life. I cannot imagine a life without you, who made me so complete." },
    { day:4,  element:"Resilience",  sig:"For my Beautiful Casanova", message:"Everyday, you wake up at sunrise, and force yourself up to college. A college where your teachers seem to hate people who try. A college that doesn't care about giving you any rest. A college that doesn't care about making a plan, and a college where even the solace of your friends is not guaranteed to relax you. After those grueling 11 hours, you come home and still do not get time for yourself. You always spend it with your parents, your sister, or me, and never complain about it. At almost 1am, you go to sleep, and 4 hours later you have to do all this all over again, and you keep doing this with a smile on your face. I hope you know, that I notice, and I know sometimes this smile is forced, and sometimes you feel like you can do nothing but just push through, and it hurts me to see that I can't do anything to make this better, but it is so inspirational to see you do this. Every time I find something difficult, my mind only ever wonders how you would have dealt with it immediately, and figured it out so easily. You are so strong, and I want you to acknowledge that today. I want you to love yourself the way I do you." },
    { day:5,  element:"Empathy",     sig:"For the Love of my Life", message:"I've never been the most empathetic person. I would even call myself selfish, since more often than not, I care mostly about myself when it comes to life. If I feel tired, I'll send my notes later. If I feel sleepy, I'll work on the group assignment in an hour. I never worry much about others and I hate that about myself, but you always pay attention to people and work hard to put a smile on their face. Everyone loves you because they see it too, how selfless you are and how much you care about them. I only wish sometimes you know that we all care about you just as much. Today, for one day, care about yourself honey. Be empathetic to yourself, and allow yourself the luxury of saying no. You deserve the world, and morosely, it starts with a 'no'." },
    { day:6,  element:"Curiosity",   sig:"For you, Booby Baby", message:"Curious about dem TITTIES HA GOTTEM (I'm sorry) \n \n Sorry had to make that joke \n \n In all seriousness, I love how much you try to get yourself into new topics. Especially how much time you spend around so many commerce students, and still maintain an interest and try to learn about what we do. You began watching anime only because of me, and you stay so curious about your own course, and how interesting everything is. I've noticed and smiled at your curiosity, and it is something I love incorporating in my daily life. Be curious my love, and always be the interesting person you are!" },
    { day:7,  element:"Trust",       sig:"For you, my Hot, Sexy Devil", message:"We stated dating in 10th grade, during covid. We then shifted immediately from never seeing and barely texting each other to a long distance relationship, 10,000 kilometres away from each other. As unfortunate and the worst way this is for any relationship to start, we also had no reason to trust each other. No reason to trust we would be compatible, no reason to trust that we'd be loyal and no reason to trust that we had a future. Still, you told me you'd wait. You told me you're okay with long distance, and with that you placed your full trust in me. \n\n I still have trouble trusting people, even the ones closest to me. I fear irrationally that I may say the wrong thing, or that what I expose about myself could create problems, but with you I feel safe. With you, I never feel worried and go on and on about the things I wouldn't even admit to myself. You trusted me, and now, I fully have trust in you. And, I will do my very best to make sure you never have a reason to believe I lie." },
    { day:8,  element:"Creativity",  sig:"For you, my babycorn", message:"The photo card about loving me berry much. The pinned heart of Spider-Man (IT'S HYPHENATED.). Knowing you'll always pick me. You've never failed to show me how much you care, and in the ways that mean the most to me. \n\n I've never been the most creative person, and even the idea of creating a website for you isn't really original, but I feel motivated to try hard for you, and find new ways to impress you. You genuinely have a unique way of looking at everything, and dare I say your jokes are getting better than mine. You've set the bar really high, and keep pushing it higher, and you have the most interesting mind I have ever seen. I pride myself on being able to understand people, and even predicting what they might say or do. With you, I never know what's coming next and it keeps me on my toes. I'm always excited to hear what's on your mind because I know it's something I never would have heard before. In you, I have the part of my brain that may be lacking, and that's probably why I went from Pandit to Pun-dit. \n\n  You make the world more colourful to me, and what brightness people lose as they grow up, I retain because you shine it in me. I only ask that once you become a proper dentist, you don't literally shine a light in my body as that would be absolutely terrifying, but safe to say you have completely co-lured me into your world, and I have no intention of leaving." },

  /* ════════════════════════════════════════
     DAY CALCULATION (series start: 25 May 2026, IST)
  ════════════════════════════════════════ */
  function getISTDate() {
    const now   = new Date();
    const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
    return new Date(utcMs + 5.5 * 3600000);
  }

  function getDayNumber() {
    const ist   = getISTDate();
    const start = new Date(2026, 4, 25); // 25 May 2026 — month is 0-indexed
    const today = new Date(ist.getFullYear(), ist.getMonth(), ist.getDate());
    const diff  = Math.floor((today - start) / 86400000) + 1;
    return Math.min(Math.max(diff, 1), 30);
  }

  function getTodayData() { return DAYS_DATA[getDayNumber() - 1]; }

  /* ════════════════════════════════════════
     IST GREETING
  ════════════════════════════════════════ */
  function getGreeting() {
    const h = getISTDate().getHours();
    if (h >= 4  && h < 6)  return { word: "What are you doing...", special: true };
    if (h >= 6  && h < 11) return { word: "Good Morning",          special: false };
    if (h >= 11 && h < 15) return { word: "Good Afternoon",        special: false };
    if (h >= 15 && h < 21) return { word: "Good Evening",          special: false };
    return                         { word: "Good Night",            special: false };
  }

  function formatDate(d) {
    return String(d.getDate()).padStart(2,'0') + '/' +
           String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
  }

  /* ════════════════════════════════════════
     POPULATE PAGE 1
  ════════════════════════════════════════ */
  function populateLanding() {
    const ist      = getISTDate();
    const data     = getTodayData();
    const greeting = getGreeting();

    document.getElementById('greetingMain').innerHTML = greeting.special
      ? `<em>${greeting.word}</em>`
      : `<em>${greeting.word}</em> my love!`;

    document.getElementById('greetingDate').textContent = `Today is ${formatDate(ist)}`;
    document.getElementById('topicName').textContent    = data.element;
    document.getElementById('dayIndicator').textContent = `Day ${getDayNumber()} of 30`;
  }

  /* ════════════════════════════════════════
     MEDIA HELPER — jpg → mp4 → Unsplash → dog.ceo → placeholder
  ════════════════════════════════════════ */
  function loadMedia(container, basePath, placeholder, fallbackUrl) {
    function showPlaceholder() {
      container.innerHTML = `<p class="polaroid-placeholder">${placeholder}</p>`;
    }
    function tryDogCeo() {
      fetch('https://dog.ceo/api/breeds/image/random')
        .then(r => r.json())
        .then(data => {
          const img3 = new Image();
          img3.style.cssText = 'width:100%;height:auto;max-height:80vh;object-fit:contain;display:block;border-radius:2px;';
          img3.onload  = () => { container.innerHTML = ''; container.appendChild(img3); };
          img3.onerror = () => showPlaceholder();
          img3.src = data.message;
        })
        .catch(() => showPlaceholder());
    }
    function tryFallback(url) {
      const img2 = new Image();
      img2.crossOrigin = 'anonymous';
      img2.style.cssText = 'width:100%;height:auto;max-height:80vh;object-fit:contain;display:block;border-radius:2px;';
      img2.onload  = () => { container.innerHTML = ''; container.appendChild(img2); };
      img2.onerror = () => tryDogCeo();
      img2.src = url;
    }
    function tryVideo() {
      const vid = document.createElement('video');
      vid.autoplay = true; vid.loop = true; vid.muted = true; vid.playsInline = true;
      vid.style.cssText = 'width:100%;height:auto;max-height:80vh;object-fit:contain;display:block;border-radius:2px;';
      vid.onerror = () => fallbackUrl ? tryFallback(fallbackUrl) : showPlaceholder();
      vid.src = basePath + '.mp4';
      container.innerHTML = '';
      container.appendChild(vid);
      vid.load();
    }
    const img = new Image();
    img.style.cssText = 'width:100%;height:auto;max-height:80vh;object-fit:contain;display:block;border-radius:2px;';
    img.onload  = () => { container.innerHTML = ''; container.appendChild(img); };
    img.onerror = () => tryVideo();
    img.src = basePath + '.jpg';
  }

  function seededRand(seed) {
    const x = Math.sin(seed + 1) * 10000;
    return x - Math.floor(x);
  }

  /* ════════════════════════════════════════
     BOTTOM POLAROID — toggle state
  ════════════════════════════════════════ */
  let bottomIsMe = false;

  function loadBottomPolaroid(showMe) {
    const day       = getDayNumber();
    const container = document.getElementById('polaroidBottomMedia');
    const caption   = document.getElementById('polaroidBottomCaption');
    if (showMe) {
      loadMedia(container, `./assets/Me${day}`, 'A photo of me (or a dog)', null);
      caption.textContent = 'A photo of me';
    } else {
      loadMedia(container, `./assets/Dog${day}`, 'A photo of me (or a dog)', DOG_URLS[day - 1]);
      caption.textContent = 'A photo of a dog \uD83D\uDC36';
    }
    bottomIsMe = showMe;
  }

  /* ════════════════════════════════════════
     POPULATE PAGE 2
  ════════════════════════════════════════ */
  function populateMessage() {
    const data = getTodayData();
    const day  = getDayNumber();

    document.getElementById('messageTitle').textContent = data.element;
    document.getElementById('messageBody').textContent  = data.message;
    document.getElementById('sigPhrase').textContent    = data.sig;

    loadMedia(
      document.getElementById('polaroidTopMedia'),
      `./assets/Us${day}`,
      'Hopefully a photo related to the topic',
      null
    );

    const defaultIsMe = seededRand(day) < 0.5;
    loadBottomPolaroid(defaultIsMe);

    document.getElementById('venomToggle').onclick = () => {
      loadBottomPolaroid(!bottomIsMe);
    };
  }

  /* ════════════════════════════════════════
     NAVIGATION
  ════════════════════════════════════════ */
  function goToMessage() { populateMessage(); switchPage('pageLanding', 'pageMessage'); }
  function goBack()       { switchPage('pageMessage', 'pageLanding'); }

  function switchPage(fromId, toId) {
    const overlay = document.getElementById('transitionOverlay');
    overlay.classList.add('active');
    setTimeout(() => {
      document.getElementById(fromId).classList.remove('active');
      document.getElementById(fromId).setAttribute('aria-hidden', 'true');
      document.getElementById(toId).classList.add('active');
      document.getElementById(toId).removeAttribute('aria-hidden');
      document.querySelectorAll(`#${toId} .animate-in`).forEach(el => {
        el.style.animation = 'none'; void el.offsetWidth; el.style.animation = '';
      });
      overlay.classList.remove('active');
    }, 350);
  }

        <mask id="${maskId}">
          <rect width="60" height="60" fill="white"/>
          <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z" fill="black"/>
        </mask>
      </defs>
      <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z" fill="#e8637a" stroke="#c43f5a" stroke-width="1.5"/>
      <line x1="6" y1="50" x2="56" y2="8" stroke="#3a7bd5" stroke-width="2.2" stroke-linecap="round" mask="url(#${maskId})"/>
      <polyline points="48,6 56,8 54,16" stroke="#3a7bd5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>`;
  }

  function spawnHeart() {
    const layer = document.getElementById('heartsLayer');
    const el    = document.createElement('div');
    el.className = 'heart-float';
    el.innerHTML = makeHeartSVG(Math.random() > 0.5 ? 'big' : 'small');
    const dur = 8 + Math.random() * 12;
    const del = Math.random() * 4;
    el.style.left              = Math.random() * 96 + 'vw';
    el.style.bottom            = '-60px';
    el.style.animationDuration = dur + 's';
    el.style.animationDelay    = del + 's';
    layer.appendChild(el);
    setTimeout(() => el.remove(), (dur + del + 1) * 1000);
  }

  setInterval(spawnHeart, 1200);
  [0, 300, 700, 1400, 2100].forEach(d => setTimeout(spawnHeart, d));

  populateLanding();
