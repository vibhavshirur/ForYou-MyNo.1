<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You, My Love 💕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Ailerons';
      src: local('Ailerons'),
           url('./assets/fonts/Ailerons-Regular.otf') format('opentype'),
           url('https://cdn.jsdelivr.net/gh/felipesilvadv/ailerons@main/Ailerons-Typeface.otf') format('opentype');
      font-display: swap;
    }

    :root {
      --her-blue:        #3a7bd5;
      --her-blue-light:  #6fa3e8;
      --her-blue-pale:   #c8dff7;
      --my-red:          #c0392b;
      --my-red-light:    #e05c4b;
      --my-red-deep:     #8b1a12;
      --warm-rose:       #f4d4d8;
      --warm-petal:      #e8b4bb;
      --heart-pink:      #e8637a;
      --heart-pink-dark: #c43f5a;
      --bg:              #fdf5f7;
      --border:          rgba(200,140,160,0.2);
      --text:            #2a1a20;
      --text-muted:      #7a5560;
      --text-faint:      #b89aa0;
      --text-on-dark:    #fff8fa;
      --font:            'Lato', 'Helvetica Neue', sans-serif;
      --font-sig:        'Ailerons', 'Josefin Sans', 'Lato', sans-serif;
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
      --text-2xl:  clamp(2rem,     1.2rem  + 2.5vw,  3.5rem);
      --text-3xl:  clamp(2.5rem,   1rem    + 4vw,    5rem);
      --sp1:.25rem;--sp2:.5rem;--sp3:.75rem;--sp4:1rem;--sp5:1.25rem;
      --sp6:1.5rem;--sp8:2rem;--sp10:2.5rem;--sp12:3rem;--sp16:4rem;
      --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;
      --r-xl:1rem;--r-2xl:1.5rem;--r-full:9999px;
      --ease-out:cubic-bezier(0.16,1,0.3,1);
      --t-fast:180ms;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;scroll-behavior:smooth;}
    body{min-height:100dvh;font-family:var(--font);font-size:var(--text-base);color:var(--text);background-color:var(--bg);line-height:1.7;overflow-x:hidden;}
    img,picture,video,canvas,svg{display:block;max-width:100%;}
    h1,h2,h3,h4{text-wrap:balance;line-height:1.2;font-family:var(--font);}
    p,li{text-wrap:pretty;max-width:65ch;}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}

    /* ── BACKGROUND BLOBS ── */
    .bg-wash{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.45;}
    .bg-blob-1{width:60vw;height:60vw;top:-10%;left:-15%;background:radial-gradient(circle,var(--her-blue-light),transparent 70%);animation:bd1 20s ease-in-out infinite alternate;}
    .bg-blob-2{width:50vw;height:50vw;bottom:-10%;right:-10%;background:radial-gradient(circle,var(--my-red-light),transparent 70%);animation:bd2 25s ease-in-out infinite alternate;}
    .bg-blob-3{width:45vw;height:45vw;top:40%;left:30%;background:radial-gradient(circle,var(--warm-petal),transparent 70%);animation:bd3 18s ease-in-out infinite alternate;}
    @keyframes bd1{from{transform:translate(0,0)scale(1);}to{transform:translate(5vw,8vh)scale(1.1);}}
    @keyframes bd2{from{transform:translate(0,0)scale(1);}to{transform:translate(-6vw,-5vh)scale(0.95);}}
    @keyframes bd3{from{transform:translate(0,0)scale(1);}to{transform:translate(-4vw,6vh)scale(1.08);}}

    /* ── FLOATING HEARTS ── */
    .hearts-layer{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
    .heart-float{position:absolute;animation:heart-rise linear forwards;opacity:0;}
    .heart-float svg{display:block;}
    @keyframes heart-rise{
      0%{opacity:0;transform:translateY(0)rotate(0deg);}
      10%{opacity:0.7;}80%{opacity:0.5;}
      100%{opacity:0;transform:translateY(-110vh)rotate(25deg);}
    }

    /* ── PAGE LAYOUT ── */
    .page{position:relative;z-index:2;min-height:100dvh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:var(--sp8) var(--sp4);}
    .page.active{display:flex;}

    /* ── PAGE 1: WELCOME ── */
    .welcome-card{
      background:rgba(255,248,250,0.78);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid var(--border);border-radius:var(--r-2xl);
      padding:clamp(var(--sp8),5vw,var(--sp16));
      max-width:680px;width:100%;text-align:center;position:relative;
    }
    .day-indicator{position:absolute;top:var(--sp4);right:var(--sp5);font-size:var(--text-xs);color:var(--text-faint);letter-spacing:0.08em;}
    .greeting-time{font-size:var(--text-sm);font-weight:300;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:var(--sp6);}
    .greeting-main{font-size:var(--text-2xl);font-weight:700;color:var(--text);margin-bottom:var(--sp4);line-height:1.15;}
    .greeting-main em{font-style:normal;background:linear-gradient(in oklab,var(--her-blue),var(--heart-pink-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .greeting-date{font-size:var(--text-base);color:var(--text-muted);margin-bottom:var(--sp8);}

    .divider-hearts{display:flex;align-items:center;gap:var(--sp3);justify-content:center;margin-bottom:var(--sp8);}
    .divider-hearts .line{flex:1;max-width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--warm-petal));}
    .divider-hearts .line.right{background:linear-gradient(90deg,var(--warm-petal),transparent);}

    .topic-announce{font-size:var(--text-base);color:var(--text-muted);margin-bottom:var(--sp4);line-height:1.7;}
    .topic-name{display:block;text-align:center;font-size:var(--text-xl);font-weight:700;font-style:italic;background:linear-gradient(in oklab,var(--my-red-deep),var(--heart-pink-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:var(--sp6);}

    .cta-row{display:flex;justify-content:flex-end;margin-top:var(--sp2);}
    .cta-btn{display:inline-flex;align-items:center;gap:var(--sp2);background:linear-gradient(135deg in oklab,var(--her-blue),var(--heart-pink-dark));color:var(--text-on-dark);font-size:var(--text-sm);font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:var(--sp3) var(--sp6);border-radius:var(--r-full);border:none;cursor:pointer;transition:opacity var(--t-fast) var(--ease-out),transform var(--t-fast) var(--ease-out);}
    .cta-btn:hover{opacity:0.9;transform:translateY(-2px);}
    .cta-btn:active{opacity:1;transform:translateY(0);}

    /* ── PAGE 2: MESSAGE ── */
    .message-page-inner{display:flex;flex-direction:column;align-items:center;gap:var(--sp6);max-width:720px;width:100%;}

    /* Polaroid */
    .polaroid{background:#fffef8;border:1px solid rgba(180,150,140,0.25);border-radius:var(--r-sm);padding:var(--sp4) var(--sp4) var(--sp8);width:100%;position:relative;}
    .polaroid-media{width:100%;aspect-ratio:4/3;background:rgba(200,180,190,0.12);border-radius:2px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
    .polaroid-media img,.polaroid-media video{width:100%;height:100%;object-fit:cover;border-radius:2px;}
    .polaroid-placeholder{font-size:var(--text-sm);color:var(--text-faint);font-style:italic;text-align:center;padding:var(--sp4);max-width:none;}
    .polaroid-caption{position:absolute;bottom:var(--sp2);left:0;right:0;text-align:center;font-size:var(--text-xs);color:var(--text-faint);letter-spacing:0.05em;}

    /* Message card */
    .message-card{background:rgba(255,248,250,0.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r-2xl);padding:clamp(var(--sp8),5vw,var(--sp16));width:100%;position:relative;}
    .back-btn{display:inline-flex;align-items:center;gap:var(--sp2);font-size:var(--text-sm);color:var(--text-muted);margin-bottom:var(--sp8);cursor:pointer;transition:color var(--t-fast) var(--ease-out);background:none;border:none;padding:0;}
    .back-btn:hover{color:var(--heart-pink-dark);}
    .message-element-label{font-size:var(--text-xs);font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--her-blue);margin-bottom:var(--sp3);}
    .message-element-title{font-size:var(--text-3xl);font-weight:700;color:var(--text);margin-bottom:var(--sp6);line-height:1.1;}
    .message-divider{width:60px;height:3px;background:linear-gradient(90deg,var(--my-red),var(--heart-pink));border-radius:var(--r-full);margin-bottom:var(--sp8);}
    .message-body{font-size:var(--text-base);color:var(--text-muted);line-height:1.9;white-space:pre-line;}

    /* Signature */
    .message-signature{margin-top:var(--sp10);font-family:var(--font-sig);font-size:var(--text-lg);color:var(--my-red);text-align:right;line-height:1.4;}
    .sig-heart{display:inline-block;vertical-align:middle;margin:0 .2rem;}
    .sig-name{display:block;font-size:var(--text-xl);}
    .venom-toggle{
      cursor:pointer;
      border-bottom:1px dashed rgba(192,57,43,0.4);
      transition:opacity var(--t-fast) var(--ease-out), border-color var(--t-fast);
    }
    .venom-toggle:hover{opacity:0.75;border-color:rgba(192,57,43,0.8);}

    /* ── PAGE TRANSITION ── */
    .page-transition-overlay{position:fixed;inset:0;z-index:100;background:linear-gradient(135deg in oklab,var(--her-blue-pale),var(--warm-rose));opacity:0;pointer-events:none;transition:opacity 0.35s var(--ease-out);}
    .page-transition-overlay.active{opacity:1;pointer-events:all;}

    /* ── ENTRY ANIMATIONS ── */
    .animate-in{animation:enter-up 0.6s var(--ease-out) both;}
    @keyframes enter-up{from{opacity:0;clip-path:inset(8% 0 0 0);}to{opacity:1;clip-path:inset(0 0 0 0);}}
    .d1{animation-delay:.08s;}.d2{animation-delay:.16s;}.d3{animation-delay:.24s;}
    .d4{animation-delay:.32s;}.d5{animation-delay:.4s;}

    @media(max-width:480px){
      .welcome-card,.message-card{border-radius:var(--r-xl);}
      .greeting-main{font-size:var(--text-xl);}
    }
  </style>
</head>
<body>

</section>

  /* ════════════════════════════════════════
     DAY CALCULATION (series start: 25 May 2026, IST)
  ════════════════════════════════════════ */
  const SERIES_START_ISO = '2026-05-25';

  function getISTDate() {
    const now   = new Date();
    const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
    return new Date(utcMs + 5.5 * 3600000);
  }

  function getDayNumber() {
    const ist   = getISTDate();
    const start = new Date(SERIES_START_ISO + 'T00:00:00+05:30');
    const today = new Date(ist.getFullYear(), ist.getMonth(), ist.getDate());
    const diff  = Math.floor((today - start) / 86400000) + 1;
    return Math.min(Math.max(diff, 1), 30);
  }

  function getTodayData() { return DAYS_DATA[getDayNumber() - 1]; }

  /* ════════════════════════════════════════
     IST GREETING
  ════════════════════════════════════════ */
  function getGreeting() {
    const h = getISTDate().getHours();
    if (h >= 4  && h < 6)  return { word: "What are you doing...", special: true };
    if (h >= 6  && h < 11) return { word: "Good Morning",          special: false };
    if (h >= 11 && h < 15) return { word: "Good Afternoon",        special: false };
    if (h >= 15 && h < 21) return { word: "Good Evening",          special: false };
    return                         { word: "Good Night",            special: false };
  }

  function formatDate(d) {
    return String(d.getDate()).padStart(2,'0') + '/' +
           String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
  }

  /* ════════════════════════════════════════
     POPULATE PAGE 1
  ════════════════════════════════════════ */
  function populateLanding() {
    const ist      = getISTDate();
    const data     = getTodayData();
    const greeting = getGreeting();

    document.getElementById('greetingMain').innerHTML = greeting.special
      ? `<em>${greeting.word}</em>`
      : `<em>${greeting.word}</em> my love!`;

    document.getElementById('greetingDate').textContent = `Today is ${formatDate(ist)}`;
    document.getElementById('topicName').textContent    = data.element;
    document.getElementById('dayIndicator').textContent = `Day ${getDayNumber()} of 30`;
  }

  /* ════════════════════════════════════════
     MEDIA HELPER — tries jpg → mp4 → fallbackUrl → placeholder
  ════════════════════════════════════════ */
  function loadMedia(container, basePath, placeholder, fallbackUrl) {
    function tryFallback(url) {
      const img2 = new Image();
      img2.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:2px;';
      img2.onload  = () => { container.innerHTML = ''; container.appendChild(img2); };
      img2.onerror = () => { container.innerHTML = `<p class="polaroid-placeholder">${placeholder}</p>`; };
      img2.src = url;
    }
    function tryVideo() {
      const vid = document.createElement('video');
      vid.autoplay = true; vid.loop = true; vid.muted = true; vid.playsInline = true;
      vid.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:2px;';
      vid.onerror = () => fallbackUrl ? tryFallback(fallbackUrl) : (container.innerHTML = `<p class="polaroid-placeholder">${placeholder}</p>`);
      vid.src = basePath + '.mp4';
      container.innerHTML = '';
      container.appendChild(vid);
      vid.load();
    }
    const img = new Image();
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:2px;';
    img.onload  = () => { container.innerHTML = ''; container.appendChild(img); };
    img.onerror = () => tryVideo();
    img.src = basePath + '.jpg';
  }

  function seededRand(seed) {
    const x = Math.sin(seed + 1) * 10000;
    return x - Math.floor(x);
  }

  /* ════════════════════════════════════════
     BOTTOM POLAROID — toggle state
  ════════════════════════════════════════ */
  let bottomIsMe = false;

  function loadBottomPolaroid(showMe) {
    const day       = getDayNumber();
    const container = document.getElementById('polaroidBottomMedia');
    const caption   = document.getElementById('polaroidBottomCaption');
    if (showMe) {
      loadMedia(container, `./assets/Me${day}`, 'A photo of me (or a dog)', null);
      caption.textContent = 'A photo of me';
    } else {
      loadMedia(container, `./assets/Dog${day}`, 'A photo of me (or a dog)', DOG_URLS[day - 1]);
      caption.textContent = 'A photo of a dog 🐶';
    }
    bottomIsMe = showMe;
  }

  /* ════════════════════════════════════════
     POPULATE PAGE 2
  ════════════════════════════════════════ */
  function populateMessage() {
    const data = getTodayData();
    const day  = getDayNumber();

    document.getElementById('messageTitle').textContent = data.element;
    document.getElementById('messageBody').textContent  = data.message;
    document.getElementById('sigPhrase').textContent    = data.sig;

    // Top polaroid: Us{day}.jpg or Us{day}.mp4
    loadMedia(
      document.getElementById('polaroidTopMedia'),
      `./assets/Us${day}`,
      'Hopefully a photo related to the topic',
      null
    );

    // Bottom polaroid: default seeded 50/50, Venom click toggles
    const defaultIsMe = seededRand(day) < 0.5;
    loadBottomPolaroid(defaultIsMe);

    document.getElementById('venomToggle').onclick = () => {
      loadBottomPolaroid(!bottomIsMe);
    };
  }

  /* ════════════════════════════════════════
     NAVIGATION
  ════════════════════════════════════════ */
  function goToMessage() { populateMessage(); switchPage('pageLanding', 'pageMessage'); }
  function goBack()       { switchPage('pageMessage', 'pageLanding'); }

  function switchPage(fromId, toId) {
    const overlay = document.getElementById('transitionOverlay');
    overlay.classList.add('active');
    setTimeout(() => {
      document.getElementById(fromId).classList.remove('active');
      document.getElementById(fromId).setAttribute('aria-hidden', 'true');
      document.getElementById(toId).classList.add('active');
      document.getElementById(toId).removeAttribute('aria-hidden');
      document.querySelectorAll(`#${toId} .animate-in`).forEach(el => {
        el.style.animation = 'none'; void el.offsetWidth; el.style.animation = '';
      });
      overlay.classList.remove('active');
    }, 350);
  }

  /* ════════════════════════════════════════
     FLOATING HEARTS
  ════════════════════════════════════════ */
  function makeHeartSVG(sz) {
    const s = sz === 'big' ? 30 : 20;
    const maskId = 'oh_' + Math.random().toString(36).slice(2);
    return `<svg width="${s}" height="${s}" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <mask id="${maskId}">
          <rect width="60" height="60" fill="white"/>
          <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z" fill="black"/>
        </mask>
      </defs>
      <path d="M30 52S8 37 8 22.5a10.5 10.5 0 0 1 22-2 10.5 10.5 0 0 1 22 2C52 37 30 52 30 52Z" fill="#e8637a" stroke="#c43f5a" stroke-width="1.5"/>
      <line x1="6" y1="50" x2="56" y2="8" stroke="#3a7bd5" stroke-width="2.2" stroke-linecap="round" mask="url(#${maskId})"/>
      <polyline points="48,6 56,8 54,16" stroke="#3a7bd5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>`;
  }

  function spawnHeart() {
    const layer = document.getElementById('heartsLayer');
    const el    = document.createElement('div');
    el.className = 'heart-float';
    el.innerHTML = makeHeartSVG(Math.random() > 0.5 ? 'big' : 'small');
    const dur = 8 + Math.random() * 12;
    const del = Math.random() * 4;
    el.style.left              = Math.random() * 96 + 'vw';
    el.style.bottom            = '-60px';
    el.style.animationDuration = dur + 's';
    el.style.animationDelay    = del + 's';
    layer.appendChild(el);
    setTimeout(() => el.remove(), (dur + del + 1) * 1000);
  }

  setInterval(spawnHeart, 1200);
  [0, 300, 700, 1400, 2100].forEach(d => setTimeout(spawnHeart, d));

  populateLanding();
</script>
